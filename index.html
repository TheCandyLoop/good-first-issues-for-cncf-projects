<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCF Good First Issues</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --label-bg: #238636;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }
        .issue-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s ease;
        }
        .issue-card:hover {
            border-color: var(--accent);
        }
        .repo-name {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .issue-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
        }
        .issue-title a {
            color: var(--accent);
            text-decoration: none;
        }
        .issue-title a:hover {
            text-decoration: underline;
        }
        .labels {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .label {
            background-color: var(--label-bg);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 2em;
            font-weight: 500;
        }
        .loader {
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CNCF Good First Issues</h1>
    <p class="subtitle">Curated beginner-friendly issues from top Cloud Native projects.</p>

    <div id="issues-container">
        <div class="loader">Loading issues...</div>
    </div>
</div>

<script>
    // MOCK DATA: So the file works when you double-click it in your browser.
    // In production, the fetch() call below will grab your real data.json.
    const mockData = [
        {
            "repo": "argoproj/argo-cd",
            "title": "docs: clarify sync options behavior in UI",
            "url": "https://github.com/argoproj/argo-cd/issues/1234",
            "labels": ["good first issue", "documentation"]
        },
        {
            "repo": "kubernetes/kubernetes",
            "title": "kubectl: fix typo in describe node output",
            "url": "https://github.com/kubernetes/kubernetes/issues/5678",
            "labels": ["good first issue", "sig/cli"]
        },
        {
            "repo": "helm/helm",
            "title": "Missing validation for chart version constraint",
            "url": "https://github.com/helm/helm/issues/9012",
            "labels": ["good first issue", "bug"]
        }
    ];

    async function loadIssues() {
        const container = document.getElementById('issues-container');
        let data = [];

        try {
            // Attempt to load the real data generated by Python
            const response = await fetch('./data.json');
            if (response.ok) {
                data = await response.json();
            } else {
                throw new Error("Local data.json not found");
            }
        } catch (error) {
            console.log("Using fallback mock data for local testing.");
            data = mockData; // Fallback to mock data if data.json isn't there
        }

        container.innerHTML = ''; // Clear loader

        if (data.length === 0) {
            container.innerHTML = '<p class="loader">No issues found at the moment.</p>';
            return;
        }

        data.forEach(issue => {
            const card = document.createElement('div');
            card.className = 'issue-card';
            
            const labelsHtml = issue.labels.map(label => 
                `<span class="label">${label}</span>`
            ).join('');

            card.innerHTML = `
                <div class="repo-name">${issue.repo}</div>
                <h3 class="issue-title">
                    <a href="${issue.url}" target="_blank" rel="noopener noreferrer">${issue.title}</a>
                </h3>
                <div class="labels">
                    ${labelsHtml}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Initialize
    loadIssues();
</script>

</body>
</html>
